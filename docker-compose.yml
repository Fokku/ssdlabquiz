services:
  web:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - db

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: "2403201@sit.singaporetech.edu.sg"
      MYSQL_DATABASE: quizdb
      MYSQL_USER: admin
      MYSQL_PASSWORD: "2403201@sit.singaporetech.edu.sg"
