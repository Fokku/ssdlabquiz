services:
  web:
    image: nginx:alpine
    ports:
      - "443:443"
    volumes:
      - ./nginx/default.conf:/etc/nginx/conf.d/default.conf:ro
      - ./nginx/certs:/etc/nginx/certs:ro
    depends_on:
      - app

  app:
    build: ./app
    environment:
      DB_HOST: db
      DB_USER: admin
      DB_PASSWORD: "2403201@sit.singaporetech.edu.sg"
      DB_NAME: quizdb
    depends_on:
      - db

  gitserver:
    build: ./gitserver
    ports:
      - "3000:3000"
    volumes:
      - git_data:/home/git

  db:
    image: mysql:8
    environment:
      MYSQL_ROOT_PASSWORD: "2403201@sit.singaporetech.edu.sg"
      MYSQL_DATABASE: quizdb
      MYSQL_USER: admin
      MYSQL_PASSWORD: "2403201@sit.singaporetech.edu.sg"
    volumes:
      - ./db/init.sql:/docker-entrypoint-initdb.d/init.sql:ro
      - ./db/100k-most-used-passwords-NCSC.txt:/var/lib/mysql-files/passwords.txt

volumes:
  git_data:
